<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Agro Data Consulting">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1810"/>
      <stop offset="100%" stop-color="#050a07"/>
    </linearGradient>
    <linearGradient id="leaf" x1="18%" y1="88%" x2="88%" y2="12%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="45%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="data" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo tipo app icon (hermano AgroPlaga) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="#22c55e" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Hoja -->
  <path
    d="M148 368
       C118 302 128 210 196 148
       C248 102 318 96 372 128
       C334 152 298 196 284 248
       C268 312 228 358 148 368
       Z"
    fill="url(#leaf)"
    filter="url(#glow)"
  />

  <!-- Vena central -->
  <path
    d="M196 148 C228 210 244 278 252 352"
    fill="none"
    stroke="#14532d"
    stroke-width="6"
    stroke-linecap="round"
    opacity="0.55"
  />

  <!-- Datos: barras (consultoría / analytics) -->
  <g fill="url(#data)" opacity="0.95">
    <rect x="228" y="268" width="28" height="72" rx="6"/>
    <rect x="268" y="238" width="28" height="102" rx="6"/>
    <rect x="308" y="208" width="28" height="132" rx="6"/>
    <rect x="348" y="248" width="28" height="92" rx="6"/>
  </g>

  <!-- Tendencia / predicción -->
  <path
    d="M220 310 L268 268 L308 228 L358 198 L388 178"
    fill="none"
    stroke="#99f6e4"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="388" cy="178" r="11" fill="#ccfbf1"/>
  <circle cx="388" cy="178" r="6" fill="#14b8a6"/>
</svg>
