# Ejemplo: clima.tudominio.com
# Instalar: sudo cp deploy/nginx-clima.conf /etc/nginx/sites-available/clima
#           sudo ln -s /etc/nginx/sites-available/clima /etc/nginx/sites-enabled/
#           sudo certbot --nginx -d clima.tudominio.com

server {
    listen 80;
    server_name clima.tudominio.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
